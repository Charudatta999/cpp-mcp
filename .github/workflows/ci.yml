name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.compiler }}" = "msvc" ]; then
            cmake -S . -B build -DMCP_WARNINGS_AS_ERRORS=ON
          else
            cmake -S . -B build -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DMCP_WARNINGS_AS_ERRORS=ON
          fi

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure

  sanitizer:
    name: ubuntu sanitizer smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-sanitize -DCMAKE_BUILD_TYPE=Debug -DMCP_ENABLE_SANITIZERS=ON -DMCP_BUILD_EXAMPLES=OFF -DMCP_BUILD_GATEWAY=OFF
      - name: Build
        run: cmake --build build-sanitize --parallel
      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure
